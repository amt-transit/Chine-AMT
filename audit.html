<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AMT - Audit Paiements</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="icon" type="image/png" href="/logo_amt.png">
</head>
<body>
    <header>
        <div class="logo-container"><img src="logo_amt.png" alt="Logo AMT Transit" class="logo"></div>
        <div class="header-info">
            <span>Agence: <span id="agence-nom">Abidjan</span></span>
            <button onclick="deconnexion()" class="btn-secondaire btn-small" style="margin-left:10px; background-color: #dc3545; color: white;">Déconnexion</button>
        </div>
    </header>

    <nav class="main-nav">
        <a href="envoi.html" class="nav-link" id="nav-envoi">📦 Envoi (Chine)</a>
        <a href="historique.html" class="nav-link" id="nav-historique">📝 Historique & Modif</a>
        <a href="reception.html" class="nav-link" id="nav-reception">📥 Réception (Abidjan)</a>
        <a href="comptabilite.html" class="nav-link" id="nav-compta">💰 Comptabilité</a>
        <a href="audit.html" class="nav-link active" id="nav-audit">📊 Audit</a>
    </nav>

    <main>
        <section id="Audit" class="page-content" style="display:block;">
            <h2><i class="fas fa-search-dollar"></i> Audit des Paiements</h2>
            <div class="sub-nav-container">
                <button class="sub-nav-link active" id="btn-audit-maritime" onclick="ouvrirSousOngletAudit('maritime')"><i class="fas fa-ship"></i> Maritime</button>
                <button class="sub-nav-link" id="btn-audit-aerien" onclick="ouvrirSousOngletAudit('aerien')"><i class="fas fa-plane"></i> Aérien</button>
            </div>
            
            <div class="card">
                <div class="form-group">
                    <input type="text" id="search-audit" placeholder="Rechercher une transaction (Ref, Nom, Agent...)" style="width: 100%;">
                </div>
                
                <div class="table-container">
                    <table id="table-audit">
                        <thead>
                            <tr>
                                <th>Date</th>
                                <th>Type</th>
                                <th>Référence</th>
                                <th>Tiers (Client)</th>
                                <th>Description</th>
                                <th>Montant</th>
                                <th>Solde</th>
                                <th>Moyen</th>
                                <th>Agent</th>
                            </tr>
                        </thead>
                        <tbody id="tbody-audit"></tbody>
                    </table>
                </div>
            </div>
        </section>
    </main>

    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-storage.js"></script>
    <script src="config.js"></script>
    <script src="auth.js"></script>
    <script src="audit.js"></script>
</body>
</html>
